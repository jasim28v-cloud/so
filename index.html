<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELYTRA | NEURAL LINK v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@200;400;800&display=swap');
        
        :root { --elytra-green: #00ffaa; --glass-core: rgba(0, 255, 170, 0.05); --glass-border: rgba(0, 255, 170, 0.1); }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: white; -webkit-tap-highlight-color: transparent; }
        
        /* Smooth Fluid Feed */
        .elytra-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -ms-overflow-style: none; }
        .elytra-feed::-webkit-scrollbar { display: none; }
        
        .video-container { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { height: 100%; width: 100%; object-fit: cover; filter: contrast(1.05) brightness(0.9); }

        /* Floating Crystal Header */
        .elytra-nav {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; z-index: 1000; display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px);
            border-radius: 20px; border: 1px solid var(--glass-border); transition: 0.3s;
        }
        .elytra-logo { font-family: 'Syncopate'; font-size: 20px; color: var(--elytra-green); letter-spacing: 5px; text-shadow: 0 0 15px var(--elytra-green); }

        /* Holographic Sidebar */
        .side-actions { position: absolute; right: 20px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .hologram-btn {
            width: 62px; height: 62px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid var(--glass-border); cursor: pointer; transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .hologram-btn:hover { border-color: var(--elytra-green); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0, 255, 170, 0.2); }
        .hologram-btn i { font-size: 24px; color: #fff; transition: 0.3s; filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
        .hologram-btn:active i { color: var(--elytra-green); transform: scale(0.8); }
        .hologram-btn span { font-size: 10px; font-weight: 800; margin-top: 5px; color: var(--elytra-green); letter-spacing: 1px; text-shadow: 0 0 5px var(--elytra-green); }

        /* Video Info Block */
        .video-meta { position: absolute; left: 25px; bottom: 110px; right: 100px; z-index: 100; pointer-events: none; }
        .elytra-badge { background: linear-gradient(135deg, var(--elytra-green), #0088ff); color: #000; padding: 6px 18px; border-radius: 30px; font-size: 12px; font-weight: 900; display: inline-block; margin-bottom: 12px; box-shadow: 0 5px 15px rgba(0,255,170,0.3); }

        /* Watermark */
        .watermark {
            position: absolute; left: 20px; top: 100px; z-index: 50;
            color: rgba(255, 255, 255, 0.1); font-size: 12px; font-weight: 200;
            letter-spacing: 4px; font-family: 'Syncopate'; pointer-events: none;
            animation: float 10s infinite ease-in-out; text-shadow: 0 0 5px rgba(255,255,255,0.1);
        }
        @keyframes float { 0%, 100% { transform: translateY(0) translateX(0); } 25% { transform: translateY(5px) translateX(10px); } 50% { transform: translateY(-5px) translateX(0px); } 75% { transform: translateY(0px) translateX(-10px); } }

        /* Main Controller Dock */
        .dock-container {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 88%; max-width: 440px; height: 75px; background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(40px); border-radius: 35px; border: 1px solid var(--glass-border);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000; transition: 0.3s;
        }
        .dock-item { color: rgba(255, 255, 255, 0.3); font-size: 22px; cursor: pointer; transition: 0.3s; }
        .dock-item.active { color: var(--elytra-green); filter: drop-shadow(0 0 10px var(--elytra-green)); }
        
        .elytra-upload {
            background: #fff; color: #000; width: 58px; height: 58px; border-radius: 22px;
            display: flex; align-items: center; justify-content: center; font-size: 26px;
            cursor: pointer; transition: 0.4s; transform: rotate(45deg);
            box-shadow: 0 5px 20px rgba(255,255,255,0.1);
        }
        .elytra-upload:hover { transform: rotate(135deg); background: var(--elytra-green); color: #000; box-shadow: 0 5px 30px rgba(0,255,170,0.4); }
        .elytra-upload i { transform: rotate(-45deg); }

        /* Comment Panel */
        .comment-panel {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 60vh;
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(50px);
            border-top: 1px solid var(--glass-border); border-radius: 30px 30px 0 0;
            z-index: 2000; transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1); padding: 30px; display: flex; flex-direction: column;
        }
        .comment-panel.open { bottom: 0; }

        /* Admin Overlay */
        #adminOverlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000;
            display: none; flex-direction: column; padding: 20px;
        }
    </style>
</head>
<body>

    <div class="watermark">ELYTRA // Neural Link v4.0</div>

    <nav class="elytra-nav" id="topNav">
        <div class="elytra-logo">ELYTRA</div>
        <div class="flex items-center gap-3">
            <span class="text-[10px] font-black opacity-40 tracking-[4px]">CORE OS_2.6</span>
            <div class="w-2 h-2 bg-[#00ffaa] rounded-full shadow-[0_0_10px_#00ffaa]"></div>
        </div>
    </nav>

    <div class="elytra-feed" id="main-render"></div>

    <div class="dock-container" id="bottomDock">
        <div class="dock-item active" onclick="location.reload()"><i class="fas fa-satellite-dish"></i></div>
        <div class="elytra-upload" onclick="startFlow()"><i class="fas fa-plus"></i></div>
        <div class="dock-item" onclick="openAdmin()"><i class="fas fa-brain"></i></div>
    </div>

    <div id="adminOverlay">
        <div class="flex justify-between items-center mb-6 border-b border-[#00ffaa33] pb-4">
            <h2 class="font-black text-[#00ffaa]">NEURAL_CONTROL</h2>
            <i class="fas fa-times cursor-pointer" onclick="closeAdmin()"></i>
        </div>
        <div id="adminList" class="flex-1 overflow-y-auto"></div>
    </div>

    <div id="commentPanel" class="comment-panel">
        <div class="comment-header flex justify-between mb-4">
            <h2 class="font-black text-xl">Comments</h2>
            <i class="fas fa-chevron-down opacity-40 cursor-pointer" onclick="closeComments()"></i>
        </div>
        <div class="comment-stream flex-1 overflow-y-auto" id="commentStream"></div>
        <div class="comment-input-area flex gap-2 pt-4">
            <input type="text" id="commentInput" class="comment-input" placeholder="Transmit thought...">
            <button onclick="postComment()" class="send-btn">Send</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://xkom-a73e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // نظام المشرف (1234)
        function openAdmin() {
            if (prompt("IDENTITY_REQUIRED:") === "1234") {
                document.getElementById('adminOverlay').style.display = 'flex';
                fetchAdminPosts();
            }
        }
        function closeAdmin() { document.getElementById('adminOverlay').style.display = 'none'; }
        
        function fetchAdminPosts() {
            const list = document.getElementById('adminList');
            list.innerHTML = 'SCANNING...';
            db.ref('elytra_posts_v4').once('value', snap => {
                list.innerHTML = '';
                snap.forEach(child => {
                    const data = child.val();
                    list.innerHTML += `
                        <div class="flex items-center justify-between bg-white/5 p-3 rounded-lg mb-2">
                            <span class="text-xs opacity-50">@${data.tag}</span>
                            <button onclick="removePost('${child.key}')" class="text-red-500 text-xs font-bold">DELETE</button>
                        </div>`;
                });
            });
        }
        function removePost(id) { if(confirm("REMOVE DATA?")) db.ref('elytra_posts_v4').child(id).remove().then(()=>fetchAdminPosts()); }

        // أنظمة Cloudinary و Feed (الأصلية)
        const widget = cloudinary.createUploadWidget({
            cloudName: "dqzjfaqg4", 
            uploadPreset: "vox_god"
        }, (err, res) => {
            if (res.event === "success") {
                db.ref('elytra_posts_v4').push({
                    url: res.info.secure_url,
                    tag: "ELY_" + Math.floor(Math.random()*9999),
                    points: 0,
                    time: Date.now()
                });
            }
        });

        function startFlow() { widget.open(); }

        let currentPostId = null;
        function loadComments(postId) {
            currentPostId = postId;
            document.getElementById('commentPanel').classList.add('open');
            db.ref(`comments/${postId}`).on('value', snap => {
                const stream = document.getElementById('commentStream');
                stream.innerHTML = '';
                snap.forEach(c => {
                    stream.innerHTML += `<div class="mb-3"><span class="c-tag">GUEST</span><p class="c-text">${c.val().text}</p></div>`;
                });
            });
        }

        function closeComments() { document.getElementById('commentPanel').classList.remove('open'); }

        function postComment() {
            const input = document.getElementById('commentInput');
            if (input.value.trim() && currentPostId) {
                db.ref(`comments/${currentPostId}`).push({ text: input.value });
                input.value = '';
            }
        }

        db.ref('elytra_posts_v4').orderByChild('time').on('value', snap => {
            const feed = document.getElementById('main-render');
            feed.innerHTML = '';
            let items = [];
            snap.forEach(c => { items.unshift({id: c.key, ...c.val()}); });
            items.forEach(item => {
                feed.innerHTML += `
                    <div class="video-container">
                        <video src="${item.url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        <div class="side-actions">
                            <div class="hologram-btn" onclick="db.ref('elytra_posts_v4/${item.id}').update({points:${(item.points||0) + 1}})">
                                <i class="fas fa-bolt text-[#00ffaa]"></i>
                                <span>${item.points||0}</span>
                            </div>
                            <div class="hologram-btn" onclick="loadComments('${item.id}')">
                                <i class="fas fa-comment-dots"></i>
                                <span>VOID</span>
                            </div>
                        </div>
                        <div class="video-meta">
                            <div class="elytra-badge">@${item.tag}</div>
                            <p class="text-[11px] font-extrabold opacity-40 uppercase tracking-[3px]">Public Neural Feed</p>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
