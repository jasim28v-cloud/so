<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELYTRA | SHADOW CORE v99</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@200;400;800&display=swap');
        
        :root { --elytra-green: #00ffaa; --glass-core: rgba(0, 255, 170, 0.05); --glass-border: rgba(0, 255, 170, 0.1); }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: white; -webkit-tap-highlight-color: transparent; }
        
        .elytra-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .elytra-feed::-webkit-scrollbar { display: none; }
        
        .video-container { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #000; overflow: hidden; }
        video { height: 100%; width: 100%; object-fit: cover; }

        .elytra-nav { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid var(--glass-border); }
        .elytra-logo { font-family: 'Syncopate'; font-size: 20px; color: var(--elytra-green); letter-spacing: 5px; text-shadow: 0 0 15px var(--elytra-green); }

        /* Heart Animation */
        .heart-effect { position: absolute; pointer-events: none; color: var(--elytra-green); font-size: 2rem; animation: heartFly 0.8s ease-out forwards; z-index: 999; }
        @keyframes heartFly {
            0% { transform: scale(0.5) translateY(0); opacity: 1; }
            100% { transform: scale(1.5) translateY(-100px) rotate(20deg); opacity: 0; }
        }

        /* Editor Modal */
        #editorModal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            width: 85%; max-width: 400px; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(30px);
            border: 1px solid var(--elytra-green); border-radius: 30px; padding: 30px; z-index: 3000;
            display: none; opacity: 0; transition: 0.4s;
        }
        #editorModal.active { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .side-actions { position: absolute; right: 20px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .hologram-btn {
            width: 62px; height: 62px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid var(--glass-border); cursor: pointer; transition: 0.3s;
        }
        .hologram-btn:active { transform: scale(0.9); border-color: var(--elytra-green); }

        .dock-container {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 88%; max-width: 440px; height: 75px; background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(40px); border-radius: 35px; border: 1px solid var(--glass-border);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .elytra-upload { background: #fff; color: #000; width: 55px; height: 55px; border-radius: 20px; display: flex; align-items: center; justify-content: center; transform: rotate(45deg); cursor: pointer; }
        .elytra-upload i { transform: rotate(-45deg); }
        
        .brain-icon { font-size: 24px; color: var(--elytra-green); cursor: pointer; text-shadow: 0 0 10px var(--elytra-green); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <nav class="elytra-nav">
        <div class="elytra-logo">ELYTRA</div>
        <div class="text-[10px] tracking-[3px] text-[#00ffaa] opacity-80">OWNER_ID: 1234</div>
    </nav>

    <div class="elytra-feed" id="main-render"></div>

    <div id="editorModal">
        <div class="text-center">
            <i class="fas fa-microchip text-4xl text-[#00ffaa] mb-4"></i>
            <h2 class="text-xl font-black mb-1">NEURAL EDITOR</h2>
            <p class="text-[10px] opacity-50 mb-6 tracking-[2px]">ENCRYPTED CORE: 1234</p>
            
            <div class="space-y-4">
                <div class="bg-white/5 p-4 rounded-xl border border-white/10 flex justify-between items-center">
                    <span class="text-xs">AI Enhancement</span>
                    <div class="w-10 h-5 bg-[#00ffaa] rounded-full"></div>
                </div>
                <div class="bg-white/5 p-4 rounded-xl border border-white/10 flex justify-between items-center">
                    <span class="text-xs">Neural Grading</span>
                    <i class="fas fa-sliders-h text-[#00ffaa]"></i>
                </div>
                <button onclick="closeEditor()" class="w-full py-4 bg-[#00ffaa] text-black font-black rounded-xl mt-4">APPLY CHANGES</button>
            </div>
        </div>
    </div>

    <div class="dock-container">
        <div class="text-white/30 text-2xl"><i class="fas fa-th-large"></i></div>
        <div class="elytra-upload" onclick="startFlow()"><i class="fas fa-plus"></i></div>
        <div class="brain-icon" onclick="openEditor()"><i class="fas fa-brain"></i></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://xkom-a73e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1234 Verification Property
        const CORE_ID = "1234";

        function openEditor() {
            document.getElementById('editorModal').style.display = 'block';
            setTimeout(() => document.getElementById('editorModal').classList.add('active'), 10);
        }

        function closeEditor() {
            document.getElementById('editorModal').classList.remove('active');
            setTimeout(() => document.getElementById('editorModal').style.display = 'none', 400);
        }

        // Heart Effect Logic
        function createHeart(e) {
            const heart = document.createElement('i');
            heart.className = 'fas fa-heart heart-effect';
            heart.style.left = (e.clientX || e.touches[0].clientX) - 20 + 'px';
            heart.style.top = (e.clientY || e.touches[0].clientY) - 20 + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 800);
        }

        const widget = cloudinary.createUploadWidget({
            cloudName: "dqzjfaqg4", 
            uploadPreset: "vox_god"
        }, (err, res) => {
            if (res.event === "success") {
                db.ref('elytra_posts_v4').push({
                    url: res.info.secure_url,
                    tag: "CORE_" + CORE_ID,
                    owner: CORE_ID,
                    points: 0,
                    time: Date.now()
                });
            }
        });

        function startFlow() { widget.open(); }

        // Render Feed with Double Click Hearts
        db.ref('elytra_posts_v4').orderByChild('time').on('value', snap => {
            const feed = document.getElementById('main-render');
            feed.innerHTML = '';
            let dataList = [];
            snap.forEach(c => { dataList.unshift({id: c.key, ...c.val()}); });
            
            dataList.forEach(item => {
                const container = document.createElement('div');
                container.className = 'video-container';
                container.innerHTML = `
                    <video src="${item.url}" loop playsinline></video>
                    <div class="side-actions">
                        <div class="hologram-btn">
                            <i class="fas fa-heart text-[#00ffaa]"></i>
                            <span>${item.points}</span>
                        </div>
                        <div class="hologram-btn"><i class="fas fa-share"></i><span>1234</span></div>
                    </div>
                    <div class="absolute left-6 bottom-28 z-50">
                        <div class="bg-[#00ffaa] text-black px-4 py-1 rounded-full text-[10px] font-black mb-2">AUTH: ${item.owner || '1234'}</div>
                        <div class="text-white font-bold">Protocol_V99_Active</div>
                    </div>
                `;

                const video = container.querySelector('video');
                
                // Click to Play/Pause + Heart Effect
                container.addEventListener('click', (e) => {
                    createHeart(e);
                    if (video.paused) video.play();
                    else video.pause();
                });

                feed.appendChild(container);
            });
        });
    </script>
</body>
</html>
