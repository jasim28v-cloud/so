<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELYTRA | NEURAL LINK v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@200;400;800&display=swap');
        
        :root { --elytra-green: #00ffaa; --glass-core: rgba(0, 255, 170, 0.05); --glass-border: rgba(0, 255, 170, 0.1); }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: white; -webkit-tap-highlight-color: transparent; }
        
        .elytra-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .elytra-feed::-webkit-scrollbar { display: none; }
        
        .video-container { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { height: 100%; width: 100%; object-fit: cover; }

        .elytra-nav { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid var(--glass-border); }
        .elytra-logo { font-family: 'Syncopate'; font-size: 20px; color: var(--elytra-green); letter-spacing: 5px; text-shadow: 0 0 15px var(--elytra-green); }

        .side-actions { position: absolute; right: 20px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .hologram-btn { width: 62px; height: 62px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid var(--glass-border); cursor: pointer; }
        .hologram-btn span { font-size: 10px; font-weight: 800; margin-top: 5px; color: var(--elytra-green); }

        .dock-container { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 88%; max-width: 440px; height: 75px; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(40px); border-radius: 35px; border: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .dock-item { color: rgba(255, 255, 255, 0.3); font-size: 22px; cursor: pointer; }
        .dock-item.active { color: var(--elytra-green); filter: drop-shadow(0 0 10px var(--elytra-green)); }
        
        .elytra-upload { background: #fff; color: #000; width: 58px; height: 58px; border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer; transform: rotate(45deg); }
        .elytra-upload i { transform: rotate(-45deg); }

        /* --- نــــظـام التحــكـم الـسري (Admin Panel) --- */
        #adminPanel {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999;
            display: none; flex-direction: column; padding: 30px; border: 2px solid var(--elytra-green);
            animation: glitch 0.2s infinite ease-in-out alternate;
        }
        @keyframes glitch { 0% { opacity: 0.98; } 100% { opacity: 1; } }
        
        .admin-header { border-bottom: 1px solid var(--elytra-green); padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .admin-scroll { flex: 1; overflow-y: auto; padding-right: 10px; }
        .post-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; }
        .post-card video { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .btn-delete { background: #ff3e3e; color: white; padding: 8px 15px; border-radius: 6px; font-weight: 800; font-size: 11px; }

        .comment-panel { position: fixed; bottom: -100%; left: 0; width: 100%; height: 60vh; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(50px); border-top: 1px solid var(--glass-border); border-radius: 30px 30px 0 0; z-index: 2000; transition: 0.5s; padding: 25px; }
        .comment-panel.open { bottom: 0; }
    </style>
</head>
<body>

    <nav class="elytra-nav">
        <div class="elytra-logo">ELYTRA</div>
        <div class="text-[10px] opacity-40 font-black tracking-widest">OS_v4.0.99</div>
    </nav>

    <div class="elytra-feed" id="main-render"></div>

    <div class="dock-container">
        <div class="dock-item active" onclick="location.reload()"><i class="fas fa-home"></i></div>
        <div class="elytra-upload" onclick="startFlow()"><i class="fas fa-plus"></i></div>
        <div class="dock-item" onclick="openAdmin()"><i class="fas fa-brain"></i></div>
    </div>

    <div id="adminPanel">
        <div class="admin-header">
            <div>
                <h1 style="color:var(--elytra-green); font-family:'Syncopate'; font-size: 18px;">ROOT_ACCESS</h1>
                <p class="text-[10px] opacity-50 uppercase mt-1">Video Management Terminal</p>
            </div>
            <button onclick="closeAdmin()" class="text-white text-2xl"><i class="fas fa-times"></i></button>
        </div>
        <div class="admin-scroll" id="adminList">
            </div>
        <div class="mt-4 p-3 border border-[#00ffaa33] text-[10px] text-[#00ffaa] font-mono">
            SHΔDØW CORE ACTIVE // ENCRYPTED_TUNNEL: STABLE
        </div>
    </div>

    <div id="commentPanel" class="comment-panel">
        <div class="flex justify-between items-center mb-5">
            <h2 class="font-black">VOID COMMENTS</h2>
            <i class="fas fa-times opacity-40" onclick="closeComments()"></i>
        </div>
        <div id="commentStream" class="overflow-y-auto h-[40vh] mb-4"></div>
        <div class="flex gap-2">
            <input type="text" id="commentInput" class="flex-1 bg-white/5 border border-white/10 rounded-lg p-3 text-sm" placeholder="Message...">
            <button onclick="postComment()" class="bg-[#00ffaa] text-black px-5 rounded-lg font-black text-xs">SEND</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://xkom-a73e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // نظام الدخول السري
        function openAdmin() {
            const pass = prompt("IDENTIFICATION REQUIRED:");
            if (pass === "1234") {
                document.getElementById('adminPanel').style.display = 'flex';
                fetchAdminData();
            } else {
                alert("ACCESS DENIED: INCORRECT CODE");
            }
        }

        function closeAdmin() {
            document.getElementById('adminPanel').style.display = 'none';
        }

        // جلب البيانات للوحة التحكم
        function fetchAdminData() {
            const list = document.getElementById('adminList');
            list.innerHTML = '<p class="text-center py-10 opacity-30">SCANNING DATABASE...</p>';
            
            db.ref('elytra_posts_v4').once('value', snap => {
                list.innerHTML = '';
                snap.forEach(child => {
                    const data = child.val();
                    list.innerHTML += `
                        <div class="post-card">
                            <video src="${data.url}"></video>
                            <div class="flex-1">
                                <div class="text-[#00ffaa] text-xs font-bold">@${data.tag}</div>
                                <div class="text-[9px] opacity-40">${child.key}</div>
                            </div>
                            <button class="btn-delete" onclick="deleteVideo('${child.key}')">DELETE</button>
                        </div>
                    `;
                });
            });
        }

        function deleteVideo(id) {
            if(confirm("CONFIRM DELETION? THIS ACTION CANNOT BE UNDONE.")) {
                db.ref('elytra_posts_v4').child(id).remove().then(() => fetchAdminData());
            }
        }

        // --- كود الرفع والعرض الأصلي ---
        const widget = cloudinary.createUploadWidget({
            cloudName: "dqzjfaqg4", 
            uploadPreset: "vox_god"
        }, (err, res) => {
            if (res.event === "success") {
                db.ref('elytra_posts_v4').push({
                    url: res.info.secure_url,
                    tag: "USER_" + Math.floor(Math.random()*999),
                    points: 0,
                    time: Date.now()
                });
            }
        });

        function startFlow() { widget.open(); }

        let currentPost = null;
        function loadComments(id) {
            currentPost = id;
            document.getElementById('commentPanel').classList.add('open');
            db.ref(`comments/${id}`).on('value', snap => {
                const s = document.getElementById('commentStream');
                s.innerHTML = '';
                snap.forEach(c => {
                    s.innerHTML += `<div class="mb-3"><span class="text-[#00ffaa] text-[10px] block">GUEST</span><p class="text-xs">${c.val().text}</p></div>`;
                });
            });
        }

        function closeComments() { document.getElementById('commentPanel').classList.remove('open'); }

        function postComment() {
            const inp = document.getElementById('commentInput');
            if(inp.value && currentPost) {
                db.ref(`comments/${currentPost}`).push({ text: inp.value });
                inp.value = '';
            }
        }

        db.ref('elytra_posts_v4').on('value', snap => {
            const render = document.getElementById('main-render');
            render.innerHTML = '';
            let items = [];
            snap.forEach(c => { items.unshift({id: c.key, ...c.val()}); });
            items.forEach(i => {
                render.innerHTML += `
                    <div class="video-container">
                        <video src="${i.url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        <div class="side-actions">
                            <div class="hologram-btn" onclick="db.ref('elytra_posts_v4/${i.id}').update({points:${i.points + 1}})">
                                <i class="fas fa-bolt text-[#00ffaa]"></i>
                                <span>${i.points}</span>
                            </div>
                            <div class="hologram-btn" onclick="loadComments('${i.id}')">
                                <i class="fas fa-comment"></i>
                                <span>VOID</span>
                            </div>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
