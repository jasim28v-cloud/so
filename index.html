<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOX GOD | ELITE V4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@700&display=swap');
        :root { --p: #ff0055; --glow: 0 0 15px rgba(255, 0, 85, 0.5); }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; }
        
        /* حاوية الفيديوهات الرئيسية */
        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .slide { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; flex-direction: column; }

        /* منطقة الفيديو */
        .v-box { position: relative; flex: 1; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* أزرار التفاعل على اليسار */
        .side-btns { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 50; }
        .btn-unit { width: 55px; height: 55px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .btn-unit i { font-size: 1.5rem; filter: drop-shadow(var(--glow)); }
        .btn-unit span { font-size: 10px; font-family: 'Orbitron'; margin-top: 2px; }

        /* منطقة الدردشة الحية */
        .chat-zone { height: 35vh; background: linear-gradient(to top, #000, #0a0a0a); border-top: 1px solid rgba(255,0,85,0.3); display: flex; flex-direction: column; }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg-line { background: rgba(255,255,255,0.04); padding: 8px 12px; border-radius: 12px; font-size: 14px; border-right: 3px solid var(--p); }
        
        .chat-input-bar { padding: 12px; display: flex; gap: 10px; background: #000; }
        .chat-input-bar input { flex: 1; background: #111; border: 1px solid #333; padding: 10px 15px; border-radius: 25px; color: #fff; outline: none; }

        /* لوحة الإدارة */
        #admin { display: none; position: fixed; inset: 0; z-index: 5000; background: rgba(0,0,0,0.98); padding: 25px; overflow-y: auto; }
        .grid-v { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .v-thumb { aspect-ratio: 1; border-radius: 15px; overflow: hidden; position: relative; border: 1px solid #222; }

        /* شريط التنقل السفلي */
        .nav-dock { position: fixed; bottom: 0; width: 100%; height: 65px; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; align-items: center; z-index: 1000; border-top: 1px solid #111; }
        .up-trigger { width: 55px; height: 45px; background: var(--p); border-radius: 15px; display: flex; align-items: center; justify-content: center; box-shadow: var(--glow); cursor: pointer; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full p-5 z-[100] flex justify-between items-center pointer-events-none">
        <div class="text-2xl font-black text-pink-600 font-[Orbitron] pointer-events-auto" style="text-shadow: var(--glow)">VOX_GOD</div>
        <i class="fas fa-terminal text-xl opacity-30 pointer-events-auto" onclick="toggleAdmin()"></i>
    </header>

    <main class="feed" id="main-feed"></main>

    <nav class="nav-dock">
        <i class="fas fa-home text-xl opacity-50"></i>
        <div class="up-trigger" id="upload-btn"><i class="fas fa-plus text-white text-xl"></i></div>
        <i class="fas fa-user-circle text-xl opacity-50" onclick="toggleAdmin()"></i>
    </nav>

    <div id="admin">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-bold font-[Orbitron]">DATABASE_ROOT</h2>
            <i class="fas fa-times text-2xl" onclick="toggleAdmin()"></i>
        </div>
        <div id="admin-grid" class="grid-v"></div>
    </div>

    <script>
        // ربط Firebase الجديد الخاص بك
        const firebaseConfig = { databaseURL: "https://xkom-a73e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myTag = 'USER_' + Math.random().toString(36).substr(2, 4).toUpperCase();

        // روابط الإعلانات
        const ADS = [
            "https://www.effectivegatecpm.com/q7bf96ad4p?key=4272e67963ce67f1cfaeb4a56682d6ec",
            "https://www.effectivegatecpm.com/w6ejwgptb?key=b77b52a8f4f7e4cdd1ac7bccc1b04a4d"
        ];

        function triggerAd() {
            const randomAd = ADS[Math.floor(Math.random() * ADS.length)];
            window.open(randomAd, '_blank');
        }

        // جلب المحتوى
        db.ref('videos').on('value', (s) => {
            const feed = document.getElementById('main-feed');
            const grid = document.getElementById('admin-grid');
            const data = s.val();
            if(!data) return;

            let h = ''; let g = '';
            Object.keys(data).reverse().forEach(id => {
                const v = data[id];
                h += `
                <section class="slide">
                    <div class="v-box">
                        <video loop playsinline src="${v.url}" onclick="this.paused?this.play():this.pause()"></video>
                        <div class="side-btns">
                            <div class="btn-unit" onclick="handleAction('${id}', 'like')"><i class="fas fa-heart text-pink-500"></i><span>${v.likes || 0}</span></div>
                            <div class="btn-unit" onclick="handleAction('${id}', 'ad')"><i class="fas fa-comment text-cyan-400"></i><span>CHAT</span></div>
                            <div class="btn-unit" onclick="handleAction('${id}', 'ad')"><i class="fas fa-share text-white"></i><span>SHARE</span></div>
                        </div>
                    </div>
                    <div class="chat-zone">
                        <div class="chat-msgs" id="chat-${id}"></div>
                        <div class="chat-input-bar">
                            <input type="text" id="in-${id}" placeholder="اكتب رسالة..." onfocus="triggerAd()">
                            <button onclick="sendMsg('${id}')" class="text-pink-500"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </section>`;
                g += `<div class="v-thumb"><video src="${v.url}#t=1" muted></video><div class="absolute top-2 right-2 bg-red-600 p-2 rounded" onclick="del('${id}')"><i class="fas fa-trash text-xs"></i></div></div>`;
            });
            feed.innerHTML = h;
            grid.innerHTML = g;
            initObs();
            Object.keys(data).forEach(id => listenChat(id));
        });

        function handleAction(id, type) {
            triggerAd(); // فتح الإعلان عند أي تفاعل (إعجاب، تعليق، مشاركة)
            if(type === 'like') db.ref(`videos/${id}/likes`).transaction(c => (c || 0) + 1);
        }

        function listenChat(id) {
            db.ref(`chats/${id}`).limitToLast(15).on('value', s => {
                const box = document.getElementById(`chat-${id}`);
                if(!box) return;
                let h = '';
                s.forEach(m => { h += `<div class="msg-line"><b>${m.val().u}:</b> ${m.val().t}</div>`; });
                box.innerHTML = h;
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendMsg(id) {
            const i = document.getElementById(`in-${id}`);
            if(!i.value.trim()) return;
            db.ref(`chats/${id}`).push({ u: myTag, t: i.value });
            i.value = '';
        }

        // ربط Cloudinary (vox_god)
        const widget = cloudinary.createUploadWidget({
            cloudName: "dqzjfaqg4", // سحابتك الجديدة
            uploadPreset: "bjebvo5p" 
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('videos').push({ url: res.info.secure_url, likes: 0 });
                alert("تم رفع الفيديو بنجاح إلى vox_god");
            }
        });

        document.getElementById('upload-btn').onclick = () => widget.open();

        function initObs() {
            const obs = new IntersectionObserver(es => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) v?.play().catch(()=>{});
                    else v?.pause();
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.slide').forEach(s => obs.observe(s));
        }

        function toggleAdmin() { const a = document.getElementById('admin'); a.style.display = a.style.display==='block'?'none':'block'; }
        function del(id) { if(confirm('حذف؟')) db.ref(`videos/${id}`).remove(); }
    </script>
</body>
</html>
