<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELYTRA | TOXIC SHADOW v7.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Orbitron:wght@400;900&family=Plus+Jakarta+Sans:wght@300;800&display=swap');
        
        :root { --toxic-green: #39ff14; --shadow-blur: rgba(57, 255, 20, 0.2); --glass: rgba(0, 0, 0, 0.6); }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: white; }

        /* التغذية الرئيسية */
        .elytra-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .elytra-feed::-webkit-scrollbar { display: none; }
        .video-container { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #000; overflow: hidden; }
        video { height: 100%; width: 100%; object-fit: cover; }

        /* العلامة المائية المتحركة */
        .floating-watermark {
            position: absolute; top: 20%; left: 10%; font-family: 'Syncopate';
            font-size: 10px; color: rgba(255, 255, 255, 0.15); pointer-events: none;
            z-index: 50; letter-spacing: 5px; animation: moveWatermark 20s infinite linear;
        }
        @keyframes moveWatermark { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(50vw, 20vh); } 50% { transform: translate(20vw, 60vh); } 75% { transform: translate(-10vw, 30vh); } }

        /* الأزرار الأيونية في المنتصف */
        .central-actions { 
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%); 
            display: flex; flex-direction: column; gap: 20px; z-index: 100;
        }
        .ionic-btn {
            width: 65px; height: 65px; background: var(--glass); backdrop-filter: blur(25px);
            border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid rgba(57, 255, 20, 0.3); transition: 0.3s;
            box-shadow: 0 0 15px var(--shadow-blur);
        }
        .ionic-btn i { font-size: 24px; color: #fff; text-shadow: 0 0 10px var(--toxic-green); }
        .ionic-btn span { font-size: 10px; font-weight: 900; color: var(--toxic-green); margin-top: 5px; }

        /* الساعة والاسم (السم المميز) */
        .toxic-meta {
            position: absolute; bottom: 130px; left: 20px; z-index: 100;
            background: linear-gradient(to right, rgba(0,0,0,0.8), transparent);
            padding: 15px; border-radius: 10px; border-left: 4px solid var(--toxic-green);
            box-shadow: -10px 0 20px var(--shadow-blur);
        }
        .user-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .user-tag { font-family: 'Orbitron'; font-weight: 900; color: var(--toxic-green); text-transform: uppercase; letter-spacing: 2px; }
        .digital-clock { font-family: 'Orbitron'; font-size: 12px; color: #fff; background: rgba(57, 255, 20, 0.2); padding: 2px 8px; border-radius: 5px; border: 1px solid var(--toxic-green); }

        /* شريط الرفع */
        .dock-container { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            width: 85%; height: 75px; background: rgba(0,0,0,0.9); backdrop-filter: blur(30px);
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); display: flex; 
            justify-content: space-around; align-items: center; z-index: 1000;
        }
        .upload-btn { width: 60px; height: 60px; background: var(--toxic-green); color: #000; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 25px; transform: rotate(45deg); box-shadow: 0 0 20px var(--toxic-green); }
        .upload-btn i { transform: rotate(-45deg); }

        /* قلوب النقر المزدوج */
        .toxic-pop { position: absolute; pointer-events: none; color: var(--toxic-green); font-size: 50px; animation: toxicPop 0.8s forwards; z-index: 2000; }
        @keyframes toxicPop { 0% { transform: scale(0); opacity: 0; } 50% { opacity: 1; transform: scale(1.2); } 100% { transform: translateY(-120px) scale(0); opacity: 0; } }
    </style>
</head>
<body>

    <div class="elytra-feed" id="feed-engine"></div>

    <div class="dock-container">
        <div onclick="location.reload()"><i class="fas fa-ghost text-2xl opacity-40"></i></div>
        <div onclick="openChat()"><i class="fas fa-comment-medical text-2xl text-[#39ff14]"></i></div>
        <div class="upload-btn" onclick="triggerUpload()"><i class="fas fa-plus"></i></div>
        <div onclick="alert('Access Code Required')"><i class="fas fa-radiation text-2xl opacity-40"></i></div>
    </div>

    <script>
        // Firebase Config
        const config = { databaseURL: "https://xkom-a73e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        // Ads Links
        const AD_L = "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c";
        const AD_S = "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e";

        // Update Digital Clock
        function getToxicTime() {
            const now = new Date();
            return now.getHours().toString().padStart(2, '0') + ":" + 
                   now.getMinutes().toString().padStart(2, '0') + ":" + 
                   now.getSeconds().toString().padStart(2, '0');
        }

        setInterval(() => {
            document.querySelectorAll('.digital-clock').forEach(el => {
                el.innerText = getToxicTime();
            });
        }, 1000);

        // Double Tap Heart
        let lastTap = 0;
        function handleToxicTap(e, id, points) {
            const now = Date.now();
            if (now - lastTap < 300) {
                const h = document.createElement('i');
                h.className = 'fas fa-biohazard toxic-pop';
                h.style.left = (e.clientX || e.touches[0].clientX) - 25 + 'px';
                h.style.top = (e.clientY || e.touches[0].clientY) - 25 + 'px';
                document.body.appendChild(h);
                db.ref(`elytra_posts_v4/${id}`).update({ points: points + 1 });
                window.open(AD_L, '_blank');
                setTimeout(() => h.remove(), 800);
            }
            lastTap = now;
        }

        // Render Feed
        db.ref('elytra_posts_v4').on('value', snap => {
            const engine = document.getElementById('feed-engine');
            engine.innerHTML = '';
            let data = [];
            snap.forEach(c => data.unshift({id: c.key, ...c.val()}));

            data.forEach(item => {
                engine.innerHTML += `
                <div class="video-container" ontouchstart="handleToxicTap(event, '${item.id}', ${item.points})">
                    <div class="floating-watermark">CONFIDENTIAL // ELYTRA NEURAL LINK</div>
                    <video src="${item.url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                    
                    <div class="central-actions">
                        <div class="ionic-btn" onclick="window.open('${AD_L}','_blank')">
                            <i class="fas fa-heart"></i>
                            <span>${item.points}</span>
                        </div>
                        <div class="ionic-btn" onclick="openChat()">
                            <i class="fas fa-skull"></i>
                            <span>VOID</span>
                        </div>
                        <div class="ionic-btn" onclick="window.open('${AD_S}','_blank')">
                            <i class="fas fa-radiation"></i>
                            <span>PUSH</span>
                        </div>
                    </div>

                    <div class="toxic-meta">
                        <div class="user-row">
                            <span class="user-tag">@${item.tag || 'Shadow_Agent'}</span>
                            <span class="digital-clock">${getToxicTime()}</span>
                        </div>
                        <p class="text-[10px] text-white/60 font-light italic">STATUS: Broadcast Secure. Neural Link Stable. [DATA_ENCRYPTED]</p>
                    </div>
                </div>`;
            });
        });

        // Cloudinary
        const widget = cloudinary.createUploadWidget({ cloudName: "dqzjfaqg4", uploadPreset: "vox_god" }, (err, res) => {
            if (res.event === "success") {
                db.ref('elytra_posts_v4').push({ url: res.info.secure_url, tag: "SHΔDØW", points: 0, time: Date.now() });
            }
        });
        function triggerUpload() { widget.open(); }
        function openChat() { alert("Neural Chat Syncing..."); }
    </script>
</body>
</html>
